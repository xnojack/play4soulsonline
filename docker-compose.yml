version: '3.9'

services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "${SERVER_PORT:-3001}:3001"
    volumes:
      - ./data:/app/data:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MAX_ROOMS=${MAX_ROOMS:-10}
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "${CLIENT_PORT:-3000}:80"
    environment:
      - VITE_SERVER_URL=${VITE_SERVER_URL:-}
      - VITE_PUBLIC_URL=${VITE_PUBLIC_URL:-}
    depends_on:
      - server
    restart: unless-stopped
